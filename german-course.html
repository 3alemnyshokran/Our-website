<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>German Language Course</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');</style>
</head>
<body class="bg-gray-100 text-gray-800">
  <!-- Header -->
  <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">German Language Course</h1>
    <div class="flex items-center gap-4">
      <button class="theme-btn bg-white text-blue-600 px-3 py-2 rounded" aria-label="Toggle Theme">
        <span class="light-icon hidden">☀️</span>
        <span class="dark-icon">🌙</span>
      </button>
      <select id="languageSelect" class="bg-white text-gray-800 px-3 py-2 rounded">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="ar">العربية</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>
    </div>
  </header>

  <main class="p-8 max-w-4xl mx-auto space-y-8">
    <!-- A1 Level -->
    <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
      <div class="flex items-center gap-4 mb-4">
        <span class="bg-blue-500 text-white px-3 py-1 rounded-full font-semibold">A1</span>
        <h2 class="text-xl font-semibold">Elementary Level</h2>
      </div>
      <a href="courses/german/chapters/a1/a1-chapter1.html" class="block bg-gray-100 dark:bg-gray-700 p-4 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition">
        <h3 class="text-lg font-semibold">Chapter 1: Grundlagen (Basics)</h3>
        <p class="text-gray-600 dark:text-gray-300">Learn basic German greetings, numbers, and essential phrases.</p>
        <div class="w-full h-2 bg-gray-200 dark:bg-gray-600 rounded mt-2">
          <div class="h-2 bg-blue-500 rounded" style="width: 0%"></div>
        </div>
      </a>
    </section>

    <!-- A2 Level Placeholder -->
    <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
      <div class="flex items-center gap-4 mb-4">
        <span class="bg-blue-500 text-white px-3 py-1 rounded-full font-semibold">A2</span>
        <h2 class="text-xl font-semibold">Pre-Intermediate Level</h2>
      </div>
      <p class="text-gray-600 dark:text-gray-300">Coming soon...</p>
    </section>

    <!-- B1 Level Placeholder -->
    <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
      <div class="flex items-center gap-4 mb-4">
        <span class="bg-blue-500 text-white px-3 py-1 rounded-full font-semibold">B1</span>
        <h2 class="text-xl font-semibold">Intermediate Level</h2>
      </div>
      <p class="text-gray-600 dark:text-gray-300">Coming soon...</p>
    </section>
  </main>

  <footer class="bg-gray-800 text-white p-4 text-center mt-12">&copy; 2025 Tutoring Website</footer>
  <script src="js/main.js"></script>
</body>
</html>
