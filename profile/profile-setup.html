<!DOCTYPE html>
<html lang="en" class="dark"> <!-- Added dark class -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup - 3alemny Shokran</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Basic styles for theme toggle icons if needed, Tailwind handles dark mode via 'dark' class on html */
    .theme-btn .light-icon { display: none; } /* Hidden by default, shown in light mode if JS requires */
    .theme-btn .dark-icon { display: inline; } /* Shown by default, hidden in dark mode if JS requires */
    html.dark .theme-btn .light-icon { display: inline; }
    html.dark .theme-btn .dark-icon { display: none; }
  </style>
  <script>
    // Tailwind dark mode setup
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col transition-colors duration-300">
  <header class="bg-blue-600 dark:bg-blue-700 text-white shadow-md">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <h1 class="text-2xl sm:text-3xl font-bold">3alemny Shokran</h1>
      <div class="flex items-center gap-3 sm:gap-4">
        <button id="theme-toggle" class="theme-btn bg-white dark:bg-slate-800 text-blue-600 dark:text-yellow-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Theme">
          <span class="light-icon">☀️</span>
          <span class="dark-icon">🌙</span>
        </button>
        <select id="languageSelect" class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-200 px-3 py-2 rounded-lg shadow focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Select Language">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <!-- Add other languages as needed -->
        </select>
      </div>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <section class="max-w-2xl mx-auto bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-xl shadow-xl">
      <h2 class="text-2xl sm:text-3xl font-semibold mb-6 text-center text-blue-600 dark:text-blue-400">Setup Your Profile</h2>
      <form id="profileSetupForm">
        <!-- Personal Information -->
        <div class="mb-6">
          <h3 class="text-xl font-medium text-slate-700 dark:text-slate-300 mb-3">Personal Information</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="fullName" class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Full Name</label>
              <input type="text" id="fullName" name="fullName" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="e.g., John Doe">
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Email Address</label>
              <input type="email" id="email" name="email" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="e.g., john.doe@example.com">
            </div>
          </div>
        </div>

        <!-- Learning Preferences -->
        <div class="mb-6">
          <h3 class="text-xl font-medium text-slate-700 dark:text-slate-300 mb-3">Learning Preferences</h3>
          <div>
            <label for="preferredSubjects" class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Preferred Subjects (comma-separated)</label>
            <input type="text" id="preferredSubjects" name="preferredSubjects" class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="e.g., Math, Science, English">
          </div>
        </div>

        <!-- Profile Picture -->
        <div class="mb-6">
          <h3 class="text-xl font-medium text-slate-700 dark:text-slate-300 mb-3">Profile Picture</h3>
          <div class="flex items-center gap-4">
            <img id="profileImagePreview" src="https://via.placeholder.com/100" alt="Profile Preview" class="w-24 h-24 rounded-full object-cover border-2 border-slate-300 dark:border-slate-600">
            <input type="file" id="profilePicture" name="profilePicture" accept="image/*" class="block w-full text-sm text-slate-500 dark:text-slate-400
              file:mr-4 file:py-2 file:px-4
              file:rounded-lg file:border-0
              file:text-sm file:font-semibold
              file:bg-blue-50 dark:file:bg-blue-900 file:text-blue-700 dark:file:text-blue-300
              hover:file:bg-blue-100 dark:hover:file:bg-blue-800
            ">
          </div>
        </div>
        
        <!-- Notifications -->
        <div class="mb-8">
            <h3 class="text-xl font-medium text-slate-700 dark:text-slate-300 mb-3">Notification Settings</h3>
            <div class="space-y-2">
                <label class="flex items-center space-x-3">
                    <input type="checkbox" name="emailNotifications" class="form-checkbox h-5 w-5 text-blue-600 dark:text-blue-500 border-slate-300 dark:border-slate-600 rounded focus:ring-blue-500 dark:bg-slate-700">
                    <span class="text-slate-700 dark:text-slate-300">Receive email notifications for course updates</span>
                </label>
                <label class="flex items-center space-x-3">
                    <input type="checkbox" name="smsNotifications" class="form-checkbox h-5 w-5 text-blue-600 dark:text-blue-500 border-slate-300 dark:border-slate-600 rounded focus:ring-blue-500 dark:bg-slate-700">
                    <span class="text-slate-700 dark:text-slate-300">Receive SMS notifications for important announcements</span>
                </label>
            </div>
        </div>

        <div class="flex justify-end">
          <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors">
            Save Profile
          </button>
        </div>
      </form>
    </section>
  </main>

  <footer class="bg-slate-800 dark:bg-slate-950 text-slate-300 dark:text-slate-400 p-6 text-center mt-auto">
    <p>&copy; <span id="currentYear">2025</span> 3alemny Shokran. All rights reserved.</p>
    <p class="text-sm">Designed with Tailwind CSS</p>
  </footer>

  <script src="../../js/main.js"></script>
  <script>
    // Update current year in footer
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // Profile picture preview
    const profilePictureInput = document.getElementById('profilePicture');
    const profileImagePreview = document.getElementById('profileImagePreview');
    if (profilePictureInput && profileImagePreview) {
      profilePictureInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            profileImagePreview.src = e.target.result;
          }
          reader.readAsDataURL(file);
        }
      });
    }

    // Handle form submission (basic example)
    const profileSetupForm = document.getElementById('profileSetupForm');
    if (profileSetupForm) {
      profileSetupForm.addEventListener('submit', function(event) {
        event.preventDefault();
        // In a real application, you would collect form data and send it to a server.
        alert('Profile saved successfully! (This is a demo)');
        // Example: Collect data
        // const formData = new FormData(profileSetupForm);
        // for (let [key, value] of formData.entries()) {
        //   console.log(key, value);
        // }
      });
    }
  </script>
</body>
</html>
