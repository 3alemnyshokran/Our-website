<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 3alemny Shokran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'custom-gray': '#F0F2F5',
                        'custom-blue': '#1877F2',
                        'custom-green': '#42B72A',
                        'dark-bg': '#18191A',
                        'dark-card': '#242526',
                        'dark-text': '#E4E6EB',
                        'dark-border': '#3A3B3C',
                        'dark-primary': '#2D88FF',
                        'dark-secondary': '#B0B3B8',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Basic styles for theme toggle icons */
        .theme-btn .light-icon { display: none; } /* Hidden by default, shown in light mode if JS requires */
        .theme-btn .dark-icon { display: inline; } /* Shown by default, hidden in dark mode if JS requires */
        html.dark .theme-btn .light-icon { display: inline; }
        html.dark .theme-btn .dark-icon { display: none; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col transition-colors duration-300">
    <header class="bg-blue-600 dark:bg-blue-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl sm:text-3xl font-bold">3alemny Shokran</h1>
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">Home</a>
                <button id="theme-toggle" class="theme-btn bg-white dark:bg-slate-800 text-blue-600 dark:text-yellow-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Theme">
                    <span class="light-icon">☀️</span> <!-- Sun icon for light mode -->
                    <span class="dark-icon">🌙</span> <!-- Moon icon for dark mode -->
                </button>
            </div>
        </div>
    </header>
    
    <main class="flex-grow flex items-center justify-center">
        <section class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-xl shadow-xl mt-10">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600 dark:text-blue-400">Create an Account</h2>
            <div class="mb-6 p-4 bg-blue-50 dark:bg-blue-900 rounded-lg text-blue-700 dark:text-blue-300 text-sm">
                <p class="flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Your information is stored locally on your device. 
                    <strong id="deviceIp" class="ml-1">IP: Loading...</strong>
                </p>
            </div>
            
            <form id="registerForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Username</label>
                    <input type="text" id="username" name="username" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="Your username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                    <input type="password" id="password" name="password" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="••••••••">
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="••••••••">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="rememberMe" name="rememberMe" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 dark:border-slate-600 rounded">
                    <label for="rememberMe" class="ml-2 block text-sm text-slate-700 dark:text-slate-300">Remember me</label>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors">Register</button>
                <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">Already have an account? <a href="login.html" class="text-blue-600 dark:text-blue-400 hover:underline">Login</a></p>
            </form>
        </section>
    </main>
    
    <footer class="bg-slate-800 dark:bg-slate-950 text-slate-300 dark:text-slate-400 p-6 text-center mt-auto">
        <p>&copy; <span id="currentYear"></span> 3alemny Shokran. All rights reserved.</p>
        <p class="text-sm">Designed with Tailwind CSS</p>
    </footer>
    
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
        const form = document.getElementById('registerForm');
        
        // Get device IP (uses public API)
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('deviceIp').textContent = 'IP: ' + data.ip;
            })
            .catch(err => {
                document.getElementById('deviceIp').textContent = 'IP: Unable to fetch';
            });
        
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Validate form
            if (!username || !password || !confirmPassword) {
                alert('Please fill all fields.');
                return;
            }
            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }
            
            // Save credentials (hashed for basic obfuscation)
            localStorage.setItem('tutor_username', username);
            localStorage.setItem('tutor_password', btoa(password)); // Simple encoding, not secure
            localStorage.setItem('tutor_trusted', 'true');
            
            // For demo purposes, show success
            alert('Registration successful!');
            window.location.href = 'index.html'; // Redirect to main page
        }
        
        form.addEventListener('submit', handleRegister);
        
        // Initialize theme toggle button
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', function() {
                    document.documentElement.classList.toggle('dark');
                    const isDark = document.documentElement.classList.contains('dark');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                });
            }
            
            // Ensure theme persistence
            if (localStorage.getItem('theme') === 'dark' || 
                (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>
</body>
</html>
