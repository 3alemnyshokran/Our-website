<!DOCTYPE html>
<html lang="en" class="dark"> <!-- Added dark class -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Educational Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body.dark {
            background-color: #1f2937; /* Tailwind gray-800 */
            color: #f3f4f6; /* Tailwind gray-100 */
        }
        body.dark .login-box {
            background-color: #374151; /* Tailwind gray-700 */
            color: #f3f4f6; /* Tailwind gray-100 */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        body.dark .login-box h1 {
            color: #60a5fa; /* Tailwind blue-400 */
        }
        body.dark .form-group label {
            color: #d1d5db; /* Tailwind gray-300 */
        }
        body.dark .form-group input[type="text"],
        body.dark .form-group input[type="password"] {
            background-color: #4b5563; /* Tailwind gray-600 */
            color: #f3f4f6; /* Tailwind gray-100 */
            border: 1px solid #6b7280; /* Tailwind gray-500 */
        }
        body.dark .form-options label,
        body.dark .form-options .forgot-password {
            color: #d1d5db; /* Tailwind gray-300 */
        }
        body.dark .form-options .forgot-password:hover {
            color: #9ca3af; /* Tailwind gray-400 */
        }
        body.dark .login-btn {
            background-color: #2563eb; /* Tailwind blue-600 */
            color: white;
        }
        body.dark .login-btn:hover {
            background-color: #1d4ed8; /* Tailwind blue-700 */
        }
        body.dark .register-link,
        body.dark .register-link a {
            color: #d1d5db; /* Tailwind gray-300 */
        }
        body.dark .register-link a:hover {
            color: #9ca3af; /* Tailwind gray-400 */
        }
    </style>
</head>
<body class="dark"> <!-- Added dark class -->
    <div class="login-container">
        <div class="login-box">
            <h1>Welcome Back</h1>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-password" onclick="forgotPassword(event)">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div class="register-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>
    <script>
    // Redirect to register if not registered
    if (!localStorage.getItem('tutor_username') || !localStorage.getItem('tutor_password')) {
        window.location.href = 'register.html';
    }
    function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const savedUsername = localStorage.getItem('tutor_username');
        const savedPassword = localStorage.getItem('tutor_password');
        const trusted = localStorage.getItem('tutor_trusted') === 'true';
        if (username === savedUsername && (btoa(password) === savedPassword || trusted)) {
            // Successful login
            window.location.href = 'our fucking project.html';
            return false;
        } else {
            alert('Incorrect username or password.');
            return false;
        }
    }
    function forgotPassword(e) {
        e.preventDefault();
        // If device is trusted, allow login without password
        const trusted = localStorage.getItem('tutor_trusted') === 'true';
        if (trusted) {
            window.location.href = 'our fucking project.html';
        } else {
            alert('Password recovery is only available on the device you registered with.');
        }
    }
    </script>
</body>
</html>
