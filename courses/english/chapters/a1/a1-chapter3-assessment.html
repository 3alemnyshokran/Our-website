    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

            <p class="text-slate-600 dark:text-slate-400">Test your knowledge of all the phrases, greetings, questions, and goodbyes from this chapter. You must score at least 70% to pass.</p>
            <div class="mt-4 bg-blue-100 dark:bg-blue-900 rounded-lg p-4 flex items-center">

    <script>
        // Theme toggle
        document.getElementById('theme-toggle').addEventListener('click', function() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });        // Assessment questions
        const questions = [            { 
              q: 'Which greeting is appropriate at 8:00 AM?', 
              ar: 'أي تحية مناسبة في الساعة 8:00 صباحًا؟',
              options: [
                {en: 'Good night', ar: 'تصبح على خير'}, 
                {en: 'Good morning', ar: 'صباح الخير'}, 
                {en: 'Good evening', ar: 'مساء الخير'}, 
                {en: 'Bye', ar: 'مع السلامة'}
              ], 
              answer: 'Good morning' 
            },
            { 
              q: 'How do you introduce yourself?', 
              ar: 'كيف تقدم نفسك؟',
              options: [
                {en: 'I am from Egypt.', ar: 'أنا من مصر.'}, 
                {en: 'My name is...', ar: 'اسمي هو...'}, 
                {en: 'Goodbye!', ar: 'وداعًا!'}, 
                {en: 'How are you?', ar: 'كيف حالك؟'}
              ], 
              answer: 'My name is...' 
            },
            { 
              q: 'What do you say when meeting someone for the first time?', 
              ar: 'ماذا تقول عند مقابلة شخص للمرة الأولى؟',
              options: [
                {en: 'See you soon!', ar: 'أراك قريبًا!'}, 
                {en: 'Nice to meet you', ar: 'تشرفت بمقابلتك'}, 
                {en: 'Good night', ar: 'تصبح على خير'}, 
                {en: 'I am fine', ar: 'أنا بخير'}
              ], 
              answer: 'Nice to meet you' 
            },
            { 
              q: 'Which is a question about someone\'s origin?', 
              ar: 'أي من الأسئلة التالية يسأل عن أصل الشخص؟',
              options: [
                {en: 'Where are you from?', ar: 'من أين أنت؟'}, 
                {en: 'How are you?', ar: 'كيف حالك؟'}, 
                {en: 'Good morning', ar: 'صباح الخير'}, 
                {en: 'Bye', ar: 'مع السلامة'}
              ], 
              answer: 'Where are you from?' 
            },
            { 
              q: 'Choose the correct response: "How are you?"', 
              ar: 'اختر الرد الصحيح: "كيف حالك؟"',
              options: [
                {en: 'My name is...', ar: 'اسمي هو...'}, 
                {en: 'I\'m fine, thank you.', ar: 'أنا بخير، شكرًا لك.'}, 
                {en: 'Good night!', ar: 'تصبح على خير!'}, 
                {en: 'See you later!', ar: 'أراك لاحقًا!'}
              ], 
              answer: "I'm fine, thank you." 
            },
            { 
              q: 'Which phrase is used to say goodbye at night?',
              ar: 'أي عبارة تستخدم لتقول وداعاً في الليل؟',
              options: [
                {en: 'Good morning', ar: 'صباح الخير'},
                {en: 'Good night', ar: 'تصبح على خير'},
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'How are you?', ar: 'كيف حالك؟'}
              ],
              answer: 'Good night' 
            },
            { 
              q: 'What do you say if you want to meet again soon?',
              ar: 'ماذا تقول إذا كنت تريد أن تلتقي مرة أخرى قريباً؟', 
              options: [
                {en: 'See you later!', ar: 'أراك لاحقاً!'},
                {en: 'Good morning!', ar: 'صباح الخير!'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'My name is...', ar: 'اسمي هو...'}
              ],
              answer: 'See you later!' 
            },
            { 
              q: 'Which is NOT a greeting?',
              ar: 'أي مما يلي ليس تحية؟',
              options: [
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'Goodbye', ar: 'وداعاً'},
                {en: 'Good morning', ar: 'صباح الخير'},
                {en: 'Good evening', ar: 'مساء الخير'}
              ], 
              answer: 'Goodbye' 
            },
            { 
              q: 'Complete: Person A: "Hello! What\'s your name?" Person B: "_______."',
              ar: 'أكمل: الشخص أ: "مرحباً! ما اسمك؟" الشخص ب: "_______."',
              options: [
                {en: 'I am from Spain.', ar: 'أنا من إسبانيا.'},
                {en: 'My name is...', ar: 'اسمي هو...'},
                {en: 'Good night!', ar: 'تصبح على خير!'},
                {en: 'How are you?', ar: 'كيف حالك؟'}
              ],
              answer: 'My name is...' 
            },
            { 
              q: 'Which phrase is used when leaving?',
              ar: 'أي عبارة تستخدم عند المغادرة؟',
              options: [
                {en: 'Goodbye', ar: 'وداعاً'},
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'Good morning', ar: 'صباح الخير'}
              ],
              answer: 'Goodbye' 
            },
            { 
              q: 'What is a polite way to ask about someone\'s feelings?',
              ar: 'ما هي الطريقة المهذبة للسؤال عن مشاعر شخص ما؟',
              options: [
                {en: 'Where are you from?', ar: 'من أين أنت؟'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'Good night!', ar: 'تصبح على خير!'},
                {en: 'Bye', ar: 'مع السلامة'}
              ],
              answer: 'How are you?' 
            },
            { 
              q: 'Choose the correct response: "What\'s your name?"',
              ar: 'اختر الرد الصحيح: "ما اسمك؟"',
              options: [
                {en: 'I\'m fine, thank you.', ar: 'أنا بخير، شكراً لك.'},
                {en: 'My name is Ahmed.', ar: 'اسمي أحمد.'},
                {en: 'See you soon!', ar: 'أراك قريباً!'},
                {en: 'Good night!', ar: 'تصبح على خير!'}
              ],
              answer: 'My name is Ahmed.' 
            },
            { 
              q: 'Which phrase is NOT a way to say goodbye?',
              ar: 'أي عبارة ليست طريقة لقول وداعاً؟',
              options: [
                {en: 'Bye!', ar: 'مع السلامة!'},
                {en: 'See you soon!', ar: 'أراك قريباً!'},
                {en: 'Good night!', ar: 'تصبح على خير!'},
                {en: 'How are you?', ar: 'كيف حالك؟'}
              ],
              answer: 'How are you?' 
            },
            { 
              q: 'Complete: Person A: "Good night!" Person B: "_______."',
              ar: 'أكمل: الشخص أ: "تصبح على خير!" الشخص ب: "_______."',
              options: [
                {en: 'Good night!', ar: 'تصبح على خير!'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'My name is...', ar: 'اسمي هو...'},
                {en: 'See you soon!', ar: 'أراك قريباً!'}
              ],
              answer: 'Good night!' 
            },
            { 
              q: 'Which greeting is used in the afternoon?',
              ar: 'أي تحية تستخدم في فترة ما بعد الظهر؟',
              options: [
                {en: 'Good morning', ar: 'صباح الخير'},
                {en: 'Good afternoon', ar: 'مساء الخير (بعد الظهر)'},
                {en: 'Good night', ar: 'تصبح على خير'},
                {en: 'Bye', ar: 'مع السلامة'}
              ],
              answer: 'Good afternoon' 
            },
            { 
              q: 'What do you say when you leave a friend?',
              ar: 'ماذا تقول عندما تغادر صديقاً؟',
              options: [
                {en: 'Goodbye', ar: 'وداعاً'},
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'Good morning', ar: 'صباح الخير'}
              ],
              answer: 'Goodbye' 
            },
            { 
              q: 'Which phrase is used to ask about someone\'s country?',
              ar: 'أي عبارة تستخدم للسؤال عن بلد شخص ما؟',
              options: [
                {en: 'Where are you from?', ar: 'من أين أنت؟'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'Good night!', ar: 'تصبح على خير!'},
                {en: 'Bye', ar: 'مع السلامة'}
              ],
              answer: 'Where are you from?' 
            },
            { 
              q: 'Choose the correct response: "It was nice meeting you!"',
              ar: 'اختر الرد الصحيح: "كان من دواعي سروري مقابلتك!"',
              options: [
                {en: 'Goodbye!', ar: 'وداعاً!'},
                {en: 'How are you?', ar: 'كيف حالك؟'},
                {en: 'My name is...', ar: 'اسمي هو...'},
                {en: 'Good morning!', ar: 'صباح الخير!'}
              ],
              answer: 'Goodbye!' 
            },
            { 
              q: 'Which phrase is a greeting?',
              ar: 'أي عبارة هي تحية؟',
              options: [
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'Bye', ar: 'مع السلامة'},
                {en: 'See you soon!', ar: 'أراك قريباً!'},
                {en: 'Good night!', ar: 'تصبح على خير!'}
              ],
              answer: 'Hello' 
            },
            { 
              q: 'What do you say before sleeping?',
              ar: 'ماذا تقول قبل النوم؟',
              options: [
                {en: 'Good night', ar: 'تصبح على خير'},
                {en: 'Good morning', ar: 'صباح الخير'},
                {en: 'Hello', ar: 'مرحباً'},
                {en: 'Bye', ar: 'مع السلامة'}
              ],
              answer: 'Good night' 
            }
        ];
        const totalQuestions = questions.length;
        let currentQuestion = 1;
        let correctAnswers = 0;
        let completed = false;
        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            questions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-container bg-white dark:bg-slate-800 rounded-xl shadow-md p-6' + (idx > 0 ? ' hidden' : '');
                qDiv.setAttribute('data-question', idx+1);
                qDiv.innerHTML = `<h3 class="text-xl font-bold mb-4">Question ${idx+1}</h3>
                    <p class="mb-4">${q.q}</p>
                    <div class="space-y-2">
                        ${q.options.map(opt => `<div class="choice-option cursor-pointer border border-slate-300 dark:border-slate-600 rounded-lg p-3" data-value="${opt.replace(/"/g,'&quot;')}">${opt}</div>`).join('')}
                    </div>
                    <div class="mt-4 feedback hidden"></div>`;
                container.appendChild(qDiv);
            });
        }
        function showQuestion(n) {
            document.querySelectorAll('.question-container').forEach(q => q.classList.add('hidden'));
            const q = document.querySelector(`.question-container[data-question="${n}"]`);
            if (q) q.classList.remove('hidden');
        }
        function updateProgress() {
            const percent = (currentQuestion-1) / totalQuestions * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${currentQuestion-1}/${totalQuestions} Questions`;
        }
        function showConfetti() {
            const confettiContainer = document.getElementById('confetti-container');
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
                confetti.style.animationDelay = (Math.random()*2) + 's';
                confettiContainer.appendChild(confetti);
            }
            setTimeout(() => { confettiContainer.innerHTML = ''; }, 5000);
        }
        function finishAssessment() {
            completed = true;
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progress-text').textContent = `${totalQuestions}/${totalQuestions} Questions`;
            let pass = correctAnswers >= Math.ceil(totalQuestions*0.7);
            document.getElementById('result-message').textContent = pass ? `Congratulations! You passed with ${correctAnswers}/${totalQuestions} correct.` : `You scored ${correctAnswers}/${totalQuestions}. Try again to pass!`;
            if (pass) {
                showConfetti();
                localStorage.setItem('a1_ch3_assessment_passed', 'true');
            } else {
                localStorage.removeItem('a1_ch3_assessment_passed');
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
            renderQuestions();
            showQuestion(currentQuestion);
            updateProgress();
            document.querySelectorAll('.choice-option').forEach(option => {
                option.addEventListener('click', function() {
                    if (completed) return;
                    const parent = this.closest('.question-container');
                    parent.querySelectorAll('.choice-option').forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    parent.querySelector('.feedback').classList.add('hidden');
                    parent.querySelector('.feedback').textContent = '';
                    // Check answer
                    const idx = parseInt(parent.getAttribute('data-question'))-1;
                    if (this.textContent.trim() === questions[idx].answer) {
                        correctAnswers++;
                        parent.querySelector('.feedback').textContent = '✓ Correct!';
                        parent.querySelector('.feedback').classList.remove('hidden');
                        setTimeout(() => {
                            if (currentQuestion < totalQuestions) {
                                currentQuestion++;
                                showQuestion(currentQuestion);
                                updateProgress();
                            } else {
                                finishAssessment();
                            }
                        }, 800);
                    } else {
                        parent.querySelector('.feedback').textContent = '✗ Try again!';
                        parent.querySelector('.feedback').classList.remove('hidden');
                    }
                });
            });
            // If already passed, show confetti and result
            if (localStorage.getItem('a1_ch3_assessment_passed') === 'true') {
                completed = true;
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('progress-text').textContent = `${totalQuestions}/${totalQuestions} Questions`;
                document.getElementById('result-message').textContent = `Congratulations! You passed previously.`;
                showConfetti();
            }
        });
    </script>
</body>
