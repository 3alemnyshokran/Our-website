<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to 3alemny Shokran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/enhanced-styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Inter', sans-serif; 
      background-image: url('https://source.unsplash.com/random/1920x1080/?education,learning');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(120deg, rgba(79, 70, 229, 0.8), rgba(59, 130, 246, 0.8), rgba(14, 165, 233, 0.8));
      background-size: 200% 200%;
      animation: gradientBG 15s ease infinite;
      z-index: -1;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .card-pop {
      animation: cardPop 0.5s ease-out;
    }
    
    @keyframes cardPop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
  <div class="animated-bg"></div>
  
  <div class="absolute top-4 right-4">
    <button id="theme-toggle" class="theme-btn bg-white dark:bg-slate-800 text-blue-600 dark:text-yellow-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Theme">
      <span class="light-icon">☀️</span> <!-- Sun icon for light mode -->
      <span class="dark-icon">🌙</span> <!-- Moon icon for dark mode -->
    </button>
  </div>
  
  <div class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl card-pop">
    <div id="welcome-back" class="hidden">
      <h1 class="text-3xl font-bold text-center text-blue-600 dark:text-blue-400 mb-6">Welcome Back!</h1>
      <h2 id="welcome-username" class="text-2xl text-center text-slate-700 dark:text-slate-300 mb-8">Hello, Friend</h2>
      
      <div class="flex flex-col items-center space-y-4">
        <a href="../index.html" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-all duration-300 hover:-translate-y-1 text-center">
          Continue Learning
        </a>
        <button id="change-user" class="text-blue-600 dark:text-blue-400 hover:underline">Not you? Use a different name</button>
      </div>
    </div>
    
    <div id="login-form-container">
      <h1 class="text-3xl font-bold text-center text-blue-600 dark:text-blue-400 mb-6">3alemny Shokran</h1>
      <h2 class="text-xl text-center text-slate-700 dark:text-slate-300 mb-8">Your Learning Journey Begins</h2>
      
      <form id="usernameForm" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Enter Your Name</label>
          <input type="text" id="username" name="username" required 
                class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" 
                placeholder="What should we call you?">
          <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">This will be used to personalize your learning experience</p>
        </div>
        
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-all duration-300 hover:-translate-y-1">
          Start Learning
        </button>
      </form>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Set up theme toggle
      const themeToggleBtn = document.getElementById('theme-toggle');
      themeToggleBtn.addEventListener('click', function() {
        document.documentElement.classList.toggle('dark');
        
        if (document.documentElement.classList.contains('dark')) {
          localStorage.setItem('theme', 'dark');
        } else {
          localStorage.setItem('theme', 'light');
        }
      });
      
      // Check for saved theme preference
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      
      // Check for saved username
      const savedUsername = localStorage.getItem('username');
      
      if (savedUsername) {
        // User already exists, show welcome back screen
        document.getElementById('welcome-username').textContent = `Hello, ${savedUsername}!`;
        document.getElementById('welcome-back').classList.remove('hidden');
        document.getElementById('login-form-container').classList.add('hidden');
        
        // Auto-redirect after 2 seconds
        setTimeout(function() {
          window.location.href = '../index.html';
        }, 2000);
      }
      
      // Handle username form submission
      document.getElementById('usernameForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        
        if (username) {
          // Save username in localStorage
          localStorage.setItem('username', username);
          
          // Also save in a cookie for server-side use if needed
          setCookie('username', username, 30); // 30 days expiration
          
          // Initialize progress values for new user
          initializeProgressValues();
          
          // Redirect to main page
          window.location.href = '../index.html';
        }
      });
      
      // Initialize progress values for new users
      function initializeProgressValues() {
        // English course progress initialization
        if (localStorage.getItem('a1_chapter1_progress') === null) {
          localStorage.setItem('a1_chapter1_progress', '0');
        }
        if (localStorage.getItem('a2_chapter1_progress') === null) {
          localStorage.setItem('a2_chapter1_progress', '0');
        }
        if (localStorage.getItem('b1_chapter1_progress') === null) {
          localStorage.setItem('b1_chapter1_progress', '0');
        }
        if (localStorage.getItem('b2_chapter1_progress') === null) {
          localStorage.setItem('b2_chapter1_progress', '0');
        }
        if (localStorage.getItem('c1_chapter1_progress') === null) {
          localStorage.setItem('c1_chapter1_progress', '0');
        }
        if (localStorage.getItem('c2_chapter1_progress') === null) {
          localStorage.setItem('c2_chapter1_progress', '0');
        }
        
        console.log('Progress values initialized for new user');
      }
      
      // Handle change user button
      document.getElementById('change-user').addEventListener('click', function() {
        document.getElementById('welcome-back').classList.add('hidden');
        document.getElementById('login-form-container').classList.remove('hidden');
        
        // Pre-fill the username field with the current value
        document.getElementById('username').value = localStorage.getItem('username') || '';
      });
      
      // Cookie utility functions
      function setCookie(name, value, days) {
        let expires = '';
        if (days) {
          const date = new Date();
          date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
          expires = '; expires=' + date.toUTCString();
        }
        document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax';
      }
    });
  </script>
</body>
</html>
