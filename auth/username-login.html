<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Username - 3alemny Shokran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    /* Basic styles for theme toggle icons */
    .theme-btn .light-icon { display: none; } /* Hidden by default, shown in light mode if JS requires */
    .theme-btn .dark-icon { display: inline; } /* Shown by default, hidden in dark mode if JS requires */
    html.dark .theme-btn .light-icon { display: inline; }
    html.dark .theme-btn .dark-icon { display: none; }
    
    .animated-bg {
      background: linear-gradient(120deg, #4f46e5, #3b82f6, #0ea5e9);
      background-size: 200% 200%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .card-pop {
      animation: cardPop 0.5s ease-out;
    }
    
    @keyframes cardPop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="animated-bg min-h-screen flex flex-col items-center justify-center p-4">
  <div class="absolute top-4 right-4">
    <button id="theme-toggle" class="theme-btn bg-white dark:bg-slate-800 text-blue-600 dark:text-yellow-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Theme">
      <span class="light-icon">☀️</span> <!-- Sun icon for light mode -->
      <span class="dark-icon">🌙</span> <!-- Moon icon for dark mode -->
    </button>
  </div>
  <div class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-xl shadow-2xl card-pop">
    <h1 class="text-3xl font-bold text-center text-blue-600 dark:text-blue-400 mb-6">3alemny Shokran</h1>
    <h2 class="text-xl text-center text-slate-700 dark:text-slate-300 mb-8">Welcome to Your Learning Journey</h2>
    
    <form id="usernameForm" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Choose a Username</label>
        <input type="text" id="username" name="username" required 
               class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" 
               placeholder="Your preferred username">
        <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">This will be used to personalize your learning experience</p>
      </div>
      
      <button type="submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-all duration-300 hover:-translate-y-1">
        Start Learning
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <p class="text-slate-600 dark:text-slate-400">Already learning with us?</p>
      <button id="continueBtn" class="mt-2 text-blue-600 dark:text-blue-400 font-medium hover:underline">Continue Learning</button>
    </div>
  </div>

  <script>
    // Cookie utility functions
    function setCookie(name, value, days) {
      let expires = "";
      if (days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toUTCString();
      }
      document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Lax";
    }

    function getCookie(name) {
      const nameEQ = name + "=";
      const ca = document.cookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) === ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
      }
      return null;
    }

    // Device info functions
    function getDeviceInfo() {
      return {
        device: navigator.userAgent,
        browser: getBrowserName(),
        os: getOperatingSystem()
      };
    }
    
    function getBrowserName() {
      const userAgent = navigator.userAgent;
      if (userAgent.indexOf("Firefox") > -1) return "Mozilla Firefox";
      else if (userAgent.indexOf("Opera") > -1 || userAgent.indexOf("OPR") > -1) return "Opera";
      else if (userAgent.indexOf("Edge") > -1) return "Microsoft Edge";
      else if (userAgent.indexOf("Chrome") > -1) return "Google Chrome";
      else if (userAgent.indexOf("Safari") > -1) return "Safari";
      else if (userAgent.indexOf("MSIE") > -1 || userAgent.indexOf("Trident") > -1) return "Internet Explorer";
      else return "Unknown browser";
    }
    
    function getOperatingSystem() {
      const userAgent = navigator.userAgent;
      if (userAgent.indexOf("Win") > -1) return "Windows";
      else if (userAgent.indexOf("Mac") > -1) return "MacOS";
      else if (userAgent.indexOf("Linux") > -1) return "Linux";
      else if (userAgent.indexOf("Android") > -1) return "Android";
      else if (userAgent.indexOf("iOS") > -1) return "iOS";
      else return "Unknown OS";
    }
    
    async function getIpAddress() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (error) {
        return 'unknown';
      }
    }

    // Handle form submission
    document.getElementById('usernameForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      if (!username) return;
      
      // Save username to localStorage and cookie
      localStorage.setItem('special_username', username);
      setCookie('username', username, 30);
      
      // Get and save device info
      const deviceInfo = getDeviceInfo();
      const ip = await getIpAddress();
      localStorage.setItem('deviceInfo', JSON.stringify(deviceInfo));
      localStorage.setItem('ip', ip);
      
      // Redirect to home page
      window.location.href = "/index.html";
    });
    
    // Check if we already have a username
    document.getElementById('continueBtn').addEventListener('click', function() {
      window.location.href = "/index.html";
    });
    
    // If username exists, go directly to home page
    const savedUsername = localStorage.getItem('special_username') || getCookie('username');    if (savedUsername) {
      document.getElementById('username').value = savedUsername;
    }
  </script>
  
  <!-- Add main.js script for theme and language handling -->
  <script src="../js/main.js"></script>
</body>
</html>
