<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - 3alemny Shokran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col transition-colors duration-300">
  <header class="bg-blue-600 dark:bg-blue-700 text-white shadow-md">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl sm:text-3xl font-bold">3alemny Shokran</h1>
      <a href="/index.html" class="bg-white dark:bg-slate-800 text-blue-600 dark:text-yellow-400 px-3 py-2 rounded-lg shadow hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">Home</a>
    </div>
  </header>
  <main class="flex-grow flex items-center justify-center">
    <section class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-xl shadow-xl mt-10">
      <h2 class="text-2xl font-bold mb-6 text-center text-blue-600 dark:text-blue-400">Login to Your Account</h2>
      <form id="loginForm" class="space-y-5">        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Username</label>
          <input type="text" id="username" name="username" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="Your username">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
          <input type="password" id="password" name="password" required class="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:text-slate-200" placeholder="••••••••">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center">
            <input type="checkbox" id="rememberMe" name="rememberMe" class="form-checkbox h-4 w-4 text-blue-600 dark:text-blue-500 border-slate-300 dark:border-slate-600 rounded focus:ring-blue-500 dark:bg-slate-700">
            <span class="ml-2 text-slate-700 dark:text-slate-300 text-sm">Remember me</span>
          </label>
          <a href="#" class="text-blue-600 dark:text-blue-400 text-sm hover:underline">Forgot password?</a>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 transition-colors">Login</button>
        <p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-4">Don't have an account? <a href="/auth/register.html" class="text-blue-600 dark:text-blue-400 hover:underline">Register</a></p>
      </form>
    </section>
  </main>
  <footer class="bg-slate-800 dark:bg-slate-950 text-slate-300 dark:text-slate-400 p-6 text-center mt-auto">
    <p>&copy; <span id="currentYear"></span> 3alemny Shokran. All rights reserved.</p>
    <p class="text-sm">Designed with Tailwind CSS</p>
  </footer>
  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
    const form = document.getElementById('loginForm');    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = form.username.value.trim();
      const password = form.password.value;
      if (!username || !password) return alert('Please fill all fields.');
      const res = await fetch('http://localhost:3001/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        if (form.rememberMe.checked) {
          localStorage.setItem('user', JSON.stringify({ username }));
        }
        alert('Login successful!');
        window.location.href = '/index.html';
      } else {
        alert(data.error || 'Login failed.');
      }
    });
    // Auto-login if remembered
    const saved = localStorage.getItem('user');
    if (saved) {
      try {
        const user = JSON.parse(saved);
        if (user.username) {
          window.location.href = '/index.html';
        }
      } catch {}
    }
  </script>
</body>
</html>
